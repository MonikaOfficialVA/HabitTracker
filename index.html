<div class="container">
    <h1>Habit Tracker</h1>
    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>

    <!-- Add Habit Card -->
    <div class="card">
        <input type="text" id="habitName" placeholder="Habit name">
        <input type="text" id="habitDesc" placeholder="Description">
        <input type="date" id="habitStartDate" placeholder="Start date">
        <input type="number" id="habitDaysGoal" placeholder="Goal duration (days)">
        <button onclick="addHabit()">Add Habit</button>
    </div>

    <!-- Habit List Card -->
    <div class="card">
        <ul id="habitList"></ul>
    </div>

    <!-- Summary Card -->
    <div class="card">
        <p>Total Completed: <span id="completedCount">0</span></p>
        <p>Longest Streak: <span id="streakCount">0</span></p>
    </div>
</div>
